spring:
  application:
    name: mytax-mapper-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mytax_mapper?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:mytax}
    password: ${DB_PASSWORD:mytax}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-local-env}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  crypto:
    secret-key: ${MYINVOIS_ENCRYPTION_KEY:change-this-32-byte-min-secret-key}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
  myinvois:
    id-server-base-url: ${MYINVOIS_ID_SERVER_BASE_URL:https://preprod-identity.myinvois.hasil.gov.my}
    api-base-url: ${MYINVOIS_API_BASE_URL:https://preprod-api.myinvois.hasil.gov.my}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-sonnet-5}
    base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-3.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  mapping:
    # which AI provider powers document mapping: "gemini" (default, has a free tier) or "claude"
    engine: ${MAPPING_ENGINE:gemini}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
